<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Pay - Réinitialiser le mot de passe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body" class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- ====== TOAST ====== -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full px-4"></div>

    <!-- ====== MODAL ====== -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-gray-100 p-6 text-center">
            <div id="modal-icon" class="mx-auto flex items-center justify-center h-14 w-14 rounded-full mb-4"></div>
            <h3 id="modal-title" class="text-lg font-bold text-gray-950 mb-2"></h3>
            <p id="modal-message" class="text-sm text-gray-500 mb-6"></p>
            <button id="modal-btn-close" class="w-full py-2.5 rounded-xl text-sm font-bold text-white transition cursor-pointer bg-esp-blue hover:bg-blue-800">
                D'accord
            </button>
        </div>
    </div>

    <!-- ====== HEADER ====== -->
    <header class="bg-esp-blue text-white shadow-md p-3">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center bg-white p-1 rounded-lg shadow-sm h-11 px-2">
                    <img src="ESP.jpg" alt="Logo ESP" class="h-9 w-auto object-contain" onerror="this.style.display='none'">
                </div>
                <h1 class="text-xl font-black tracking-wide">ESP PAY</h1>
            </div>
            <span class="text-xs bg-white/10 text-blue-100 px-3 py-1 rounded-full font-medium">Réinitialisation</span>
        </div>
    </header>

    <!-- ====== MAIN ====== -->
    <main class="container mx-auto p-4 flex-grow flex items-center justify-center">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-6 md:p-8">

            <div class="text-center mb-6">
                <div class="flex justify-center mb-4">
                    <div class="bg-esp-blue/10 p-3 rounded-full">
                        <i class="fa-solid fa-key text-esp-blue text-2xl"></i>
                    </div>
                </div>
                <h2 class="text-xl font-bold text-gray-950">Réinitialiser le mot de passe</h2>
                <p class="text-gray-500 text-xs mt-1">Entrez votre email universitaire pour recevoir un lien de réinitialisation.</p>
            </div>

            <form id="reset-form" class="space-y-4" novalidate>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Mail Universitaire</label>
                    <input type="email" id="reset-email" placeholder="prenom.nom@esp.sn" 
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-esp-blue outline-none text-sm">
                    <p id="reset-email-error" class="text-xs text-red-600 mt-1 hidden">Veuillez saisir un email valide (@esp.sn ou @ucad.edu.sn).</p>
                </div>

                <button type="submit" id="btn-reset" 
                        class="w-full bg-esp-blue hover:bg-blue-800 text-white font-bold py-2.5 rounded-xl transition cursor-pointer shadow-md flex items-center justify-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i>
                    Envoyer le lien de réinitialisation
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="index.html" class="text-xs text-esp-blue hover:underline font-medium">
                    <i class="fa-solid fa-arrow-left mr-1"></i>
                    Retour à la connexion
                </a>
            </div>

        </div>
    </main>

    <!-- ====== FOOTER ====== -->
    <footer class="bg-gray-900 text-gray-400 text-center text-xs p-4 border-t-4 border-esp-green">
        <p>&copy; 2026 École Supérieure Polytechnique de Dakar. Tous droits réservés.</p>
    </footer>

    <!-- ====== FIREBASE ====== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, sendPasswordResetEmail } from "firebase/auth";

        // ============================================================
        // CONFIGURATION FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCbsEUQ9YRb87wFu196TZnNrTZntgiGZE8",
            authDomain: "esp-pay.firebaseapp.com",
            projectId: "esp-pay",
            storageBucket: "esp-pay.firebasestorage.app",
            messagingSenderId: "629871793149",
            appId: "1:629871793149:web:7522b73742d4d15187bf94"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ============================================================
        // TOAST & MODAL
        // ============================================================
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            container.innerHTML = '';
            const toast = document.createElement('div');
            const bgClass = type === 'success' 
                ? 'bg-emerald-50 border-emerald-200 text-emerald-900' 
                : 'bg-rose-50 border-rose-200 text-rose-900';
            const iconClass = type === 'success' 
                ? 'fa-circle-check text-emerald-600' 
                : 'fa-circle-exclamation text-rose-600';
            
            toast.className = `flex items-center gap-3 p-4 rounded-xl border ${bgClass} shadow-lg text-sm font-medium`;
            toast.innerHTML = `<i class="fa-solid ${iconClass} text-lg"></i><div class="flex-grow">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function showModal(title, message, type = 'success') {
            const modal = document.getElementById('custom-modal');
            const iconContainer = document.getElementById('modal-icon');
            const btnClose = document.getElementById('modal-btn-close');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerHTML = message;
            
            if (type === 'success') {
                iconContainer.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full mb-4 bg-emerald-100 text-emerald-600 text-xl";
                iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
                btnClose.className = "w-full bg-esp-blue hover:bg-blue-800 py-2.5 rounded-xl text-sm font-bold text-white transition cursor-pointer";
            } else {
                iconContainer.className = "mx-auto flex items-center justify-center h-14 w-14 rounded-full mb-4 bg-rose-100 text-rose-600 text-xl";
                iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
                btnClose.className = "w-full bg-rose-600 hover:bg-rose-700 py-2.5 rounded-xl text-sm font-bold text-white transition cursor-pointer";
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
            
            btnClose.onclick = () => {
                modal.classList.add('opacity-0');
                modal.querySelector('div').classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.remove('flex');
                    modal.classList.add('hidden');
                }, 300);
            };
        }

        // ============================================================
        // VALIDATION EN DIRECT
        // ============================================================
        function setFieldError(inputId, errorId, condition, message) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            
            if (!input || !error) return;

            const check = () => {
                const value = input.value.trim();
                if (condition(value)) {
                    input.classList.add('border-red-500', 'ring-red-500');
                    input.classList.remove('border-gray-300');
                    error.classList.remove('hidden');
                } else {
                    input.classList.remove('border-red-500', 'ring-red-500');
                    input.classList.add('border-gray-300');
                    error.classList.add('hidden');
                }
            };

            input.addEventListener('input', check);
            return check;
        }

        // Email : @esp.sn ou @ucad.edu.sn
        setFieldError('reset-email', 'reset-email-error', 
            (v) => v.length > 0 && !v.endsWith('@esp.sn') && !v.endsWith('@ucad.edu.sn'),
            'Utilisez votre email @esp.sn ou @ucad.edu.sn.'
        );

        // ============================================================
        // RÉINITIALISATION DU MOT DE PASSE
        // ============================================================
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailInput = document.getElementById('reset-email');
            const email = emailInput.value.trim().toLowerCase();

            if (!email) {
                emailInput.classList.add('border-red-500', 'ring-red-500');
                emailInput.classList.remove('border-gray-300');
                document.getElementById('reset-email-error').classList.remove('hidden');
                return;
            }

            if (!email.endsWith('@esp.sn') && !email.endsWith('@ucad.edu.sn')) {
                emailInput.classList.add('border-red-500', 'ring-red-500');
                emailInput.classList.remove('border-gray-300');
                document.getElementById('reset-email-error').classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-reset');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Envoi en cours...';

            try {
                await sendPasswordResetEmail(auth, email);

                showModal(
                    "📧 Email envoyé !",
                    `Un lien de réinitialisation a été envoyé à :<br><strong>${email}</strong><br><br>
                    📬 Vérifiez votre boîte de réception (et vos spams).<br><br>
                    🔐 Cliquez sur le lien pour choisir un nouveau mot de passe.`,
                    "success"
                );

                emailInput.value = "";
                emailInput.classList.remove('border-red-500', 'ring-red-500');
                emailInput.classList.add('border-gray-300');
                document.getElementById('reset-email-error').classList.add('hidden');

            } catch (error) {
                console.error("❌ Erreur:", error);
                if (error.code === 'auth/user-not-found') {
                    emailInput.classList.add('border-red-500', 'ring-red-500');
                    emailInput.classList.remove('border-gray-300');
                    document.getElementById('reset-email-error').classList.remove('hidden');
                    document.getElementById('reset-email-error').innerText = '❌ Aucun compte associé à cet email.';
                } else if (error.code === 'auth/invalid-email') {
                    emailInput.classList.add('border-red-500', 'ring-red-500');
                    emailInput.classList.remove('border-gray-300');
                    document.getElementById('reset-email-error').classList.remove('hidden');
                    document.getElementById('reset-email-error').innerText = '❌ Format d\'email invalide.';
                } else {
                    showToast("❌ Erreur: " + error.message, "error");
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Envoyer le lien de réinitialisation';
            }
        });

        console.log("🔐 ESP Pay - Page de réinitialisation du mot de passe");
    </script>

</body>
</html>
